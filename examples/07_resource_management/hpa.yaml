# 📈 HorizontalPodAutoscaler (HPA) Örneği

```yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-app-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-app
  minReplicas: 2
  maxReplicas: 20
  
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70        # %70 CPU kullanımında ölçeklendir
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300 # 5 dk bekle (oscillation önler)
      policies:
      - type: Percent
        value: 50                     # %50 azalt
        periodSeconds: 60
    scaleUp:
      policies:
      - type: Pods
        value: 4                      # Bir seferde en fazla 4 pod ekle
        periodSeconds: 15
```
