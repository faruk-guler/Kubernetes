# ⛩️ Gateway API Örneği (2026 Standardı)

```yaml
# [ADIM 1] Gateway - Altyapı Tanımı
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: production-gateway
  namespace: istio-system
spec:
  gatewayClassName: cilium             # Cilium veya Istio
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
---
# [ADIM 2] HTTPRoute - Uygulama Yönlendirme
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend-route
  namespace: production
spec:
  parentRefs:
  - name: production-gateway
    namespace: istio-system
  hostnames:
  - "api.example.com"
  rules:
  - matches:
    - path: { type: PathPrefix, value: /v1 }
    backendRefs:
    - name: backend-v1-svc
      port: 8080
```
