# 📁 PV ve PVC Örnekleri

```yaml
# [TIP 1] Statik PersistentVolume (Admin tarafından)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: static-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: "/mnt/data"
---
# [TIP 2] PersistentVolumeClaim (Kullanıcı tarafından)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd          # Dinamik StorageClass
  resources:
    requests:
      storage: 5Gi
---
# KULLANIM ÖRNEĞİ (POD)
apiVersion: v1
kind: Pod
metadata:
  name: storage-pod
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
  
  containers:
  - name: nginx
    image: nginxinc/nginx-unprivileged:alpine
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
    
    resources:
      requests: { cpu: "100m", memory: "128Mi" }
      limits: { cpu: "200m", memory: "256Mi" }
    
    livenessProbe:
      httpGet: { path: /, port: 8080 }
    
    volumeMounts:
    - name: storage-vol
      mountPath: /data
    - name: tmp-vol
      mountPath: /tmp
  
  volumes:
  - name: storage-vol
    persistentVolumeClaim:
      claimName: app-pvc
  - name: tmp-vol
    emptyDir: {}
```
