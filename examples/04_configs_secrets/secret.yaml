# 🔐 Secret Örneği

```yaml
# [TİP 1] Opaque - Genel Şifreler
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
data:
  username: YWRtaW4=                  # admin (base64)
  password: cGFzc3dvcmQxMjM=          # password123
---
# [TİP 2] TLS - Sertifikalar
apiVersion: v1
kind: Secret
metadata:
  name: site-tls
type: kubernetes.io/tls
data:
  tls.crt: <BASE64_CERT>
  tls.key: <BASE64_KEY>
---
# KULLANIM ÖRNEĞİ (ENV FROM)
apiVersion: v1
kind: Pod
metadata:
  name: secret-test-pod
spec:
  containers:
  - name: app
    image: my-app:latest
    envFrom:
    - secretRef:
        name: db-credentials
```
