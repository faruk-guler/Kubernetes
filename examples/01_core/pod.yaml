# 📦 Pod Örneği (Modern & Güvenli)

```yaml
apiVersion: v1
kind: Pod
metadata:
  name: techops-pod
  labels:
    app: techops
    tier: backend
  annotations:
    "prometheus.io/scrape": "true"
    "prometheus.io/port": "8080"

spec:
  # --- GENEL AYARLAR ---
  restartPolicy: Always
  terminationGracePeriodSeconds: 30
  
  # --- GÜVENLİK (2026 STANDARDI) ---
  securityContext:
    runAsNonRoot: true              # 🔥 Root kullanıcısı yasak
    runAsUser: 1000
    runAsGroup: 3000
    fsGroup: 2000
    seccompProfile:
      type: RuntimeDefault

  # --- ZAMANLAMA (SCHEDULING) ---
  nodeSelector:
    disktype: ssd

  # --- KONTEYNERLER ---
  containers:
  - name: main-app
    image: nginx:1.27-alpine
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true   # 🔥 Salt-okunur dosya sistemi
      capabilities:
        drop: ["ALL"]
        add: ["NET_BIND_SERVICE"]

    ports:
    - name: http
      containerPort: 80
      protocol: TCP

    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

    # SAĞLIK KONTROLLERİ
    livenessProbe:
      httpGet: { path: /healthz, port: 80 }
      initialDelaySeconds: 15
      periodSeconds: 20
    readinessProbe:
      httpGet: { path: /healthz, port: 80 }
      initialDelaySeconds: 5
      periodSeconds: 10

    volumeMounts:
    - name: cache-vol
      mountPath: /var/cache/nginx
    - name: run-vol
      mountPath: /var/run

  # --- DEPOLAMA ---
  volumes:
  - name: cache-vol
    emptyDir: {}
  - name: run-vol
    emptyDir: {}

  # --- BAŞLANGIÇ (INIT) ---
  initContainers:
  - name: init-check
    image: busybox:1.36
    command: ["sh", "-c", "echo 'Sistem Hazirlaniyor...'; sleep 2"]
    resources:
      requests: { cpu: "50m", memory: "32Mi" }
      limits: { cpu: "100m", memory: "64Mi" }
```
