# 🕵️ DaemonSet Örneği (Sistem Ajanı)

```yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  labels:
    app: node-exporter
    tier: observability
spec:
  # HANGİ POD'LARI YÖNETECEĞİMİZİ BELİRLER
  selector:
    matchLabels:
      app: node-exporter
  
  # GÜNCELLEME STRATEJİSİ
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1               # Aynı anda en fazla 1 node güncellenebilir
  
  # POD ŞABLONU
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      # --- GÜVENLİK (POD SEVİYESİ) ---
      securityContext:
        runAsNonRoot: false           # Node monitoring için root gerekebilir
        runAsUser: 0
      
      hostNetwork: true               # 🔥 Host ağını kullan (Metrics için)
      hostPID: true                   # 🔥 Host process'leri gör
      
      # TÜM NODE'LARDA ÇALIŞABİLMESİ İÇİN (MASTER DAHİL)
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      
      containers:
      - name: node-exporter
        image: prom/node-exporter:v1.8.1
        args:
        - --path.procfs=/host/proc
        - --path.sysfs=/host/sys
        
        securityContext:
          allowPrivilegeEscalation: true
          readOnlyRootFilesystem: true
          capabilities:
            add: ["SYS_TIME"]         # Sadece gerekli kernel yetkilerini ekleyin

        ports:
        - name: metrics
          containerPort: 9100
          protocol: TCP

        # KAYNAK YÖNETİMİ
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"
        
        # SAĞLIK KONTROLLERİ
        livenessProbe:
          httpGet: { path: /, port: 9100 }
          initialDelaySeconds: 10
        readinessProbe:
          httpGet: { path: /, port: 9100 }
          initialDelaySeconds: 5

        # HOST BAĞLANTILARI (VOLUME MOUNTS)
        volumeMounts:
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys
          mountPath: /host/sys
          readOnly: true
      
      # --- DEPOLAMA (VOLUMES) ---
      volumes:
      - name: proc
        hostPath: { path: /proc }
      - name: sys
        hostPath: { path: /sys }
```
