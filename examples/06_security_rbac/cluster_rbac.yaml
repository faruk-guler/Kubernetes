# 🗺️ Cluster RBAC Örneği

```yaml
# ClusterRole - Tüm cluster'da geçerli izinler
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-view-only
rules:
- apiGroups: [""]
  resources: ["nodes", "namespaces", "pods"]
  verbs: ["get", "list", "watch"]
---
# ClusterRoleBinding - ClusterRole'u belirli bir ServiceAccount'a bağla
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: global-viewer-binding
subjects:
- kind: ServiceAccount
  name: admin-dashboard-sa
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: cluster-view-only
  apiGroup: rbac.authorization.k8s.io
```
