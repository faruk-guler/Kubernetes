# 🔐 Secret Örneği

# [TİP 1] Opaque - Genel Şifreler
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
data:
  username: YWRtaW4=                  # admin (base64)
  password: cGFzc3dvcmQxMjM=          # password123
---
# [TİP 2] TLS - Sertifikalar
apiVersion: v1
kind: Secret
metadata:
  name: site-tls
type: kubernetes.io/tls
data:
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCg==
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCg==
---
# KULLANIM ÖRNEĞİ (ENV FROM)
apiVersion: v1
kind: Pod
metadata:
  name: secret-test-pod
spec:
  containers:
  - name: app
    image: my-app:1.0.0
    envFrom:
    - secretRef:
        name: db-credentials
