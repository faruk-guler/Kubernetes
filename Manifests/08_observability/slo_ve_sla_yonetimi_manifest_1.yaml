# billing-availability-slo isimli ServiceLevelObjective nesnesi tanımlama dosyası
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: billing-availability-slo
  namespace: monitoring
  labels:
    prometheus: k8s
    role: alert-rules
spec:
  target: 99.9 # %99.9 başarı hedefi
  window: 30d # 30 günlük kayan pencere
  description: "Faturalandırma servisinin başarılı HTTP yanıtı verme oranı hedeflenmektedir."
  service: billing-api
  indicator:
    # SLI sorgu mantığı
    ratio:
      errors:
        metric: http_requests_total{job="billing-api", code=~"5.."}
      total:
        metric: http_requests_total{job="billing-api"}
