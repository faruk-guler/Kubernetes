# team-sre-slack isimli GrafanaContactPoint nesnesi tanımlama dosyası
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaContactPoint
metadata:
  name: team-sre-slack
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana-main"
  settings:
    name: "SRE Slack Channel"
    type: "slack"
    # Slack webhook adresi
    addresses:
      - "https://hooks.slack.com/services/T00/B00/XX"
