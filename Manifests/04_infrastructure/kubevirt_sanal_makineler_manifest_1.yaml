# l2-adv isimli L2Advertisement nesnesi tanımlama dosyası
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: production-ips
  namespace: metallb-system
spec:
  addresses:
  - 192.168.10.200-192.168.10.250 # Dışarıdan erişilebilir IP aralığı
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-adv
  namespace: metallb-system
spec:
  ipAddressPools:
  - production-ips
