# global-webapp-ingress isimli MultiClusterIngress nesnesi tanımlama dosyası
apiVersion: networking.karmada.io/v1alpha1
kind: MultiClusterIngress
metadata:
  name: global-webapp-ingress
  namespace: production
spec:
  # Küresel DNS yönlendirme kuralları
  rules:
    - host: app.global.company.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webapp-service
                port:
                  number: 80
