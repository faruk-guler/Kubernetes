# team-alpha-vcluster isimli Application nesnesi tanımlama dosyası
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team-alpha-vcluster
  namespace: argocd
spec:
  project: default
  source:
    chart: vcluster
    repoURL: https://charts.loft.sh
    targetRevision: 0.19.5
    helm:
      values: |
        sync:
          services:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: vcluster-team-alpha
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
