# team-alpha-quota isimli ResourceQuota nesnesi tanımlama dosyası
apiVersion: v1
    kind: ResourceQuota
    metadata:
      name: team-alpha-quota
      namespace: team-alpha
    spec:
      hard:
        pods: "20"
        requests.cpu: "4"
        requests.memory: 8Gi
        limits.cpu: "8"
        limits.memory: 16Gi
