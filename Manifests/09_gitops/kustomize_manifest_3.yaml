# kustomize-prod-app isimli Application nesnesi tanımlama dosyası
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kustomize-prod-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/company/my-app-gitops.git'
    targetRevision: HEAD
    path: overlays/prod # Kustomize overlay dizini
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
