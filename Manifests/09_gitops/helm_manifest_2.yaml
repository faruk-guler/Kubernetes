# secured-nginx isimli Application nesnesi tanımlama dosyası
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secured-nginx
  namespace: argocd
spec:
  project: default
  source:
    chart: nginx
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 15.x.x # Chart versiyonu
    helm:
      # values.yaml içindeki değerleri doğrudan buraya gömebilirsiniz
      values: |
        replicaCount: 2
        service:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
