# http-success-rate-analysis isimli AnalysisTemplate nesnesi tanımlama dosyası
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: http-success-rate-analysis
  namespace: production
spec:
  metrics:
  - name: success-rate
    interval: 1m
    successCondition: result[0] >= 0.99 # Başarı oranı %99'un üzerinde olmalı
    failureLimit: 3
    provider:
      prometheus:
        address: http://prometheus-operated.monitoring.svc.cluster.local:9090
        query: |
          sum(rate(http_requests_total{job="payment-api", status!~"5.."}[1m]))
          /
          sum(rate(http_requests_total{job="payment-api"}[1m]))
