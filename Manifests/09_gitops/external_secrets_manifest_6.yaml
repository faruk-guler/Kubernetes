# external_secrets isimli ClusterSecretStore nesnesi tanımlama dosyası
spec:
  refreshInterval: "5m" # Sık sık kontrol et, şifre değişimini anında yansıt
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: dynamic-postgres-credentials
  data:
  - secretKey: username
    remoteRef:
      # Vault dynamic db motoru yolu
      key: database/creds/my-postgres-role
      property: username
  - secretKey: password
    remoteRef:
      key: database/creds/my-postgres-role
      property: password
