# gitlab_cicd_derinlemesine_inceleme isimli Kubernetes nesnesi tanımlama dosyası
stages:
  - test
  - build
  - scan
  - deploy-gitops

variables:
  REGISTRY_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

# 1. Aşama: Testler
run-unit-tests:
  stage: test
  image: node:20-alpine
  script:
    - npm ci
    - npm test

# 2. Aşama: Kaniko ile Güvenli İmaj Derleme (Rootless Build)
build-docker-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    # GitLab Container Registry kimlik doğrulamasını yapın
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
    # Derle ve Push et
    - /kaniko/executor --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile --destination $REGISTRY_IMAGE

# 3. Aşama: Trivy ile İmaj Güvenlik Taraması
vulnerability-scan:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    # Ciddi açıkları denetleyin, varsa build'i kırın
    - trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed $REGISTRY_IMAGE

# 4. Aşama: GitOps Manifest Sürümünü Güncelleme
update-manifests:
  stage: deploy-gitops
  image: alpine:latest
  before_script:
    - apk add --no-cache git curl
  script:
    - git config --global user.email "gitlab-ci@company.com"
    - git config --global user.name "GitLab CI Bot"
    # GitOps projesini checkout yapın (Project Access Token kullanarak)
    - git clone https://oauth2:${GITOPS_ACCESS_TOKEN}@gitlab.com/my-group/my-gitops-infra.git
    cd my-gitops-infra
    # YAML dosyasındaki sürümü yeni imaj etiketiyle değiştirin:
    - sed -i "s|image:.*|image: $REGISTRY_IMAGE|g" manifests/app-deployment.yaml
    - git add .
    - git commit -m "chore(gitlab-ci): deploy release $CI_COMMIT_SHORT_SHA [skip ci]"
    - git push origin main
