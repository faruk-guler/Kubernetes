# oci-app-deploy isimli Application nesnesi tanımlama dosyası
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oci-app-deploy
  namespace: argocd
spec:
  project: default
  source:
    chart: my-chart # OCI url'sinin sonundaki paket adı
    repoURL: ghcr.io/company/charts # oci:// prefix'i olmadan yazılır
    targetRevision: 1.2.0 # Kurulacak sürüm
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
