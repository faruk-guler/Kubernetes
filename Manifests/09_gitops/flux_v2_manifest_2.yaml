# app-source-repo isimli GitRepository nesnesi tanımlama dosyası
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: app-source-repo
  namespace: flux-system
spec:
  interval: 1m # Her dakikada bir Git değişikliklerini kontrol et
  url: https://github.com/my-company/my-app-code.git
  ref:
    branch: main
  secretRef:
    name: github-ssh-credentials # Git erişim anahtarı (Secret)
