# ab-test-routing isimli VirtualService nesnesi tanımlama dosyası
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: ab-test-routing
spec:
  hosts:
  - webapp.company.com
  http:
  - match:
    - headers:
        Cookie:
          regex: ".*user_segment=beta.*" # Tarayıcı çerezinde beta yazanlar
    route:
    - destination:
        host: webapp-canary # Yeni tasarıma gönder
  - route:
    - destination:
        host: webapp-stable # Varsayılan kararlı ortama gönder
