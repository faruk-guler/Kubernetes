# tedarik_zinciri_guvenligi isimli Kubernetes nesnesi tanımlama dosyası
name: Build, Scan and Sign Image

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Cosign Keyless OIDC için zorunludur!

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3.4.0

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Image
      id: build-image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
        outputs: type=image,name=target,write-intent=true

    - name: Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
        format: 'table'
        exit-code: '1' # Ciddi açılarda build'i durdur
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: Sign the Push Image (Keyless OIDC)
      env:
        COSIGN_YES: "true"
      run: |
        # İmajı digest (sha256) üzerinden imzalıyoruz
        cosign sign ghcr.io/${{ github.repository }}@${{ steps.build-image.outputs.digest }}
