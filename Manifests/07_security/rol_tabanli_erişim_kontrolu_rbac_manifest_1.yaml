# bot-deploy-binding isimli Role nesnesi tanımlama dosyası
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deploy-bot
  namespace: production

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: production
  name: deployment-updater
rules:
- apiGroups: ["apps"] # Deployment nesneleri "apps" API grubundadır
  resources: ["deployments"]
  verbs: ["get", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bot-deploy-binding
  namespace: production
subjects:
- kind: ServiceAccount
  name: deploy-bot
  namespace: production
roleRef:
  kind: Role
  name: deployment-updater
  apiGroup: rbac.authorization.k8s.io
