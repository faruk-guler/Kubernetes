# mysql-data isimli StatefulSet nesnesi tanımlama dosyası
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-cluster
  namespace: production
spec:
  serviceName: db-service-headless
  replicas: 3
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: "longhorn"
        resources:
          requests:
            storage: 10Gi
