# gpu-inference-pod isimli Pod nesnesi tanımlama dosyası
apiVersion: v1
kind: Pod
metadata:
  name: gpu-inference-pod
spec:
  containers:
  - name: model-container
    image: nvcr.io/nvidia/pytorch:23.10-py3
    command: ["python3", "-c", "import torch; print(torch.cuda.is_available())"]
    resources:
      limits:
        nvidia.com/gpu: "1" # Sanal veya fiziksel 1 adet GPU talep ediyoruz
  tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"
