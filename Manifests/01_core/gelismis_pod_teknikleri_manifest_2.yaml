# process-sharing-pod isimli Pod nesnesi tanımlama dosyası
apiVersion: v1
kind: Pod
metadata:
  name: process-sharing-pod
spec:
  shareProcessNamespace: true # Süreç paylaşımını aktif eder
  containers:
  - name: app
    image: python:3.11-slim
    command: ["python", "-m", "http.server", "8080"]
  - name: debugger
    image: busybox:1.36
    command: ["sh", "-c", "sleep 3600"]
