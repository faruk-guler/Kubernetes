apiVersion: v1
kind: Pod
metadata:
  name: downward-api-demo
  namespace: production
  labels:
    app: downward-demo
    env: prod
  annotations:
    build-version: v2.5.1
    owner: devops-team
spec:
  containers:
  - name: app-container
    image: busybox:stable
    command: ["sh", "-c"]
    args:
    - |
      echo "--- ENVIRONMENT VARIABLES ---"
      echo "Pod Name: $MY_POD_NAME"
      echo "Pod IP: $MY_POD_IP"
      echo "CPU Limit: $MY_CPU_LIMIT"
      echo "--- VOLUME FILES ---"
      cat /etc/podinfo/labels
      cat /etc/podinfo/annotations
      sleep 3600
    resources:
      limits:
        cpu: "1"
        memory: "512Mi"
      requests:
        cpu: "0.5"
        memory: "256Mi"
    env:
    - name: MY_POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: MY_CPU_LIMIT
      valueFrom:
        resourceFieldRef:
          containerName: app-container
          resource: limits.cpu
    volumeMounts:
    - name: podinfo
      mountPath: /etc/podinfo
  volumes:
  - name: podinfo
    downwardAPI:
      items:
      - path: "labels"
        fieldRef:
          fieldPath: metadata.labels
      - path: "annotations"
        fieldRef:
          fieldPath: metadata.annotations
