apiVersion: v1
kind: Pod
metadata:
  name: gpu-training-job
  namespace: production
spec:
  containers:
  - name: tensorflow
    image: tensorflow/tensorflow:latest-gpu
    command: ["python", "-c", "print('Training model on GPU...')"]
  tolerations:
  - key: "ekip"
    operator: "Equal"
    value: "yapay-zeka"
    effect: "NoSchedule"
