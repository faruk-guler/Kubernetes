# coklu_mimari_imaj_derleme isimli Kubernetes nesnesi tanımlama dosyası
name: Build and Push Multi-Arch Image

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. QEMU emülasyonunu kur (ARM64 çalıştırabilmek için)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Buildx aracını yapılandır
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Registry'ye Login ol
      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: registry.example.com
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # 4. Multi-Arch Build ve Push
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: registry.example.com/production/myapp:${{ github.ref_name }}
