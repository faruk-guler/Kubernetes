# 🏛️ Namespace Örneği (PSA Dahil)

```yaml
apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    # --- POD SECURITY ADMISSION (PSA) - 2026 STANDARDI ---
    # restricted: En siki güvenlik (Root yasak, hostPath yasak)
    # baseline: Standart güvenlik kısıtlamaları
    # privileged: Hiçbir kısıtlama yok
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: "latest"
    
    # UYARI MODU (Audit için)
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: "latest"
    
    # MONITORING & MESH
    istio-injection: enabled
    monitoring: prometheus
```
