# 🏃 Job Örneği (Tekil Görev)

```yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: database-backup
  labels:
    job-group: maintenance
spec:
  # --- GÖREV AYARLARI ---
  ttlSecondsAfterFinished: 3600       # Tamamlandiktan 1 saat sonra sil
  backoffLimit: 3                     # En fazla 3 kez hata hakki
  activeDeadlineSeconds: 600          # En fazla 10 dakika calisabilir
  
  template:
    metadata:
      labels:
        job: database-backup
    spec:
      restartPolicy: OnFailure        # 🔥 Job için (Never veya OnFailure)
      
      # --- GÜVENLİK (POD SEVİYESİ) ---
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001

      containers:
      - name: backup-worker
        image: postgres:16.3-alpine
        command: ["sh", "-c", "echo 'Yedekleme Basladi...'; sleep 5; echo 'Yedekleme Tamamlandi.'"]
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]

        # KAYNAK YÖNETİMİ
        resources:
          requests:
            cpu: "200m"
            memory: "128Mi"
          limits:
            cpu: "1"
            memory: "256Mi"
```
